name: AtrestPreview
options:
  bundleIdPrefix: com.atrest
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: 2.40.0

settings:
  SWIFT_VERSION: "5.10"
  DEVELOPMENT_TEAM: ""
  PRODUCT_BUNDLE_IDENTIFIER: com.atrest.AtrestPreview

targets:
  AtrestPreview:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AtrestPreview
        excludes:
          - Resources
    resources:
      - path: AtrestPreview/Resources
        optional: false
      - path: AtrestPreview/Assets.xcassets
    settings:
      INFOPLIST_FILE: AtrestPreview/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      PRODUCT_NAME: AtrestPreview
      TARGETED_DEVICE_FAMILY: "1,2"
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    scheme:
      testTargets: []
