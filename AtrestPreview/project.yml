name: AtrestPreview
options:
  minimumXcodeGenVersion: 2.38.0

targets:
  AtrestPreview:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - README.md
          - .github
    resources:
      - path: Resources
      - path: Assets.xcassets
    settings:
      PRODUCT_NAME: AtrestPreview
      PRODUCT_BUNDLE_IDENTIFIER: com.atrest.preview
      SWIFT_VERSION: 5.10
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  AtrestPreview:
    build:
      targets:
        AtrestPreview: all
    run:
      config: Debug
    archive:
      config: Release
